{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-xl p-8 w-full max-w-md shadow-sm">
        <h2 class="text-2xl font-bold mb-6 text-center">LandlordIQ</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <input type="text" name="username" placeholder="Username" class="w-full px-4 py-2 border rounded-lg">
            </div>
            <div class="mb-6">
                <input type="password" name="password" placeholder="Password" class="w-full px-4 py-2 border rounded-lg">
            </div>
            <button type="submit" class="w-full py-2 rounded-lg text-white bg-brand">Login</button>
        </form>
    </div>
</div>
{% endblock %}
