<div class="bg-gray-50 rounded-lg p-4">
    <div class="flex justify-between items-start">
        <div>
            <p class="font-bold text-gray-800">Unit {{ unit.unit_number }}</p>
            <p class="text-sm text-gray-500">{% if unit.is_occupied %}Occupied{% else %}Vacant{% endif %}</p>
        </div>
        <div class="text-right">
            <p class="font-bold text-gray-800">KES {{ unit.default_rent|floatformat:0 }}</p>
            <p class="text-xs text-gray-500">Monthly Rent</p>
        </div>
    </div>
</div>
