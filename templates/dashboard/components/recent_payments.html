<div class="bg-white rounded-xl p-5 shadow-sm">
    <h3 class="font-bold text-gray-800 mb-4">Recent M-Pesa Payments</h3>
    <div class="space-y-4">
        {% for payment in payments|slice:":5" %}
        <div class="flex items-start gap-3 fade-up">
            <div class="w-2 h-2 rounded-full bg-green-500 mt-2"></div>
            <div class="flex-1">
                <p class="font-medium text-gray-800">{{ payment.name }}</p>
                <p class="text-sm text-gray-500">{{ payment.unit }} · KES {{ payment.amount }}</p>
                <div class="flex justify-between items-center mt-0.5">
                    <p class="text-xs text-gray-400">{{ payment.time }}</p>
                    <p class="text-xs text-gray-400">Ref: {{ payment.ref }}</p>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="text-center text-gray-500 py-8">No recent payments</div>
        {% endfor %}
    </div>
</div>
