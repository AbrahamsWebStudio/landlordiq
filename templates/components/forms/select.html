<div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 mb-2">
        {{ label }}
    </label>

    <select
        name="{{ name }}"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#2D5A27] focus:border-[#2D5A27] outline-none"
        {% if required %}required{% endif %}
    >
        <option value="">{{ placeholder|default:"Select option" }}</option>

        {% for option in options %}
            <option value="{{ option.value }}"
                {% if option.value == selected %}selected{% endif %}>
                {{ option.label }}
            </option>
        {% endfor %}
    </select>
</div>
