<aside id="sidebar" class="hidden lg:flex fixed top-0 left-0 w-64 h-full flex-col py-6 px-4 z-50 transition-transform bg-bg-sidebar">
    <div class="flex justify-end lg:hidden mb-4">
        <button id="closeSidebarBtn" class="text-white hover:text-gray-300">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
    </div>
    
    <h2 class="text-white font-bold text-xl mb-8 px-3">LandlordIQ</h2>
    <nav class="flex-1 space-y-1">
        <a href="{% url 'dashboard:dashboard' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-white bg-brand">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
            <span>Dashboard</span>
        </a>
        <a href="{% url 'properties:property_list' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-text-muted hover:bg-brand/30">
            <i data-lucide="building" class="w-4 h-4"></i>
            <span>Properties</span>
        </a>
        <a href="{% url 'tenants:tenant_list' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-text-muted hover:bg-brand/30">
            <i data-lucide="users" class="w-4 h-4"></i>
            <span>Tenants</span>
        </a>
        <a href="{% url 'payments:tenant_ledger' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-text-muted hover:bg-brand/30">
            <i data-lucide="credit-card" class="w-4 h-4"></i>
            <span>Payments</span>
        </a>
        <a href="{% url 'maintenance:index' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-text-muted hover:bg-brand/30">
            <i data-lucide="wrench" class="w-4 h-4"></i>
            <span>Maintenance</span>
        </a>
    </nav>
</aside>

<script>
    const sidebar = document.getElementById('sidebar');
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const closeSidebarBtn = document.getElementById('closeSidebarBtn');
    
    if (hamburgerBtn) {
        hamburgerBtn.addEventListener('click', function() {
            sidebar.classList.remove('hidden');
            sidebar.classList.add('flex');
        });
    }
    
    if (closeSidebarBtn) {
        closeSidebarBtn.addEventListener('click', function() {
            sidebar.classList.add('hidden');
            sidebar.classList.remove('flex');
        });
    }
    
    document.addEventListener('click', function(event) {
        if (window.innerWidth < 1024) {
            if (sidebar && !sidebar.classList.contains('hidden')) {
                if (!sidebar.contains(event.target) && !hamburgerBtn?.contains(event.target)) {
                    sidebar.classList.add('hidden');
                    sidebar.classList.remove('flex');
                }
            }
        }
    });
</script>
