<!-- Desktop Button -->
<div class="hidden lg:flex">
    <a href="{{ url }}" class="bg-brand text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-brand-dark transition inline-flex items-center gap-1">
        <i data-lucide="plus" class="w-3 h-3"></i> {{ button_text|default:"Add" }}
    </a>
</div>

<!-- Mobile Floating Button -->
<div class="fixed bottom-20 right-4 z-30 lg:hidden">
    <a href="{{ url }}" class="w-14 h-14 rounded-full bg-brand text-white flex items-center justify-center shadow-lg hover:bg-brand-dark transition">
        <i data-lucide="plus" class="w-6 h-6"></i>
    </a>
</div>
