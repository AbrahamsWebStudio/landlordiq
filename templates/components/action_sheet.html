<div id="actionSheet" class="hidden fixed inset-0 z-50 flex items-end" style="background: rgba(10, 31, 10, 0.95);">
    <div class="w-full bg-[#142E14] rounded-t-3xl p-6 pt-4 animate-slide-up">
        <div class="flex justify-center mb-4">
            <div class="w-10 h-1 bg-[#3A6B35] rounded-full"></div>
        </div>
        <h2 class="text-center text-white font-bold text-xl mb-1">Manage Overdue Rent</h2>
        <p id="actionSheetSubtitle" class="text-center text-[#a3c9a0] text-sm mb-6">Loading...</p>
        
        <div class="space-y-3">
            <button id="sendReminderBtn" class="btn-press w-full h-14 rounded-xl flex items-center justify-center gap-3 font-medium text-base bg-[#2D5A27] text-white hover:brightness-110 transition">
                <i data-lucide="message-circle" class="w-5 h-5"></i> Send Reminder
            </button>
            <button id="callTenantBtn" class="btn-press w-full h-14 rounded-xl flex items-center justify-center gap-3 font-medium text-base border border-[#3A6B35] bg-transparent text-white hover:bg-[#3A6B35]/20 transition">
                <i data-lucide="phone" class="w-5 h-5"></i> Call Tenant
            </button>
            <button id="viewLedgerBtn" class="btn-press w-full h-14 rounded-xl flex items-center justify-center gap-3 font-medium text-base border border-[#3A6B35] bg-transparent text-white hover:bg-[#3A6B35]/20 transition">
                <i data-lucide="book-open" class="w-5 h-5"></i> View Ledger
            </button>
        </div>
        <div class="mt-5 text-center">
            <button id="closeSheetBtn" class="bg-transparent text-[#a3c9a0] text-sm hover:text-white transition btn-press">Close</button>
        </div>
    </div>
</div>

<style>
    @keyframes slide-up {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
    }
    .animate-slide-up {
        animation: slide-up 0.3s ease-out;
    }
    .btn-press {
        transition: transform 0.12s ease, opacity 0.2s;
    }
    .btn-press:active {
        transform: scale(0.97);
    }
</style>

<script>
    let currentTenant = null;
    
    window.openActionSheet = function(tenant) {
        currentTenant = tenant;
        const subtitle = document.getElementById('actionSheetSubtitle');
        if (subtitle) subtitle.innerText = `${tenant.name} · ${tenant.unit} · KES ${tenant.amount}`;
        const sheet = document.getElementById('actionSheet');
        if (sheet) {
            sheet.classList.remove('hidden');
            lucide.createIcons();
        }
    };
    
    window.closeActionSheet = function() {
        const sheet = document.getElementById('actionSheet');
        if (sheet) sheet.classList.add('hidden');
    };
    
    document.addEventListener('DOMContentLoaded', function() {
        const sendBtn = document.getElementById('sendReminderBtn');
        const callBtn = document.getElementById('callTenantBtn');
        const viewBtn = document.getElementById('viewLedgerBtn');
        const closeBtn = document.getElementById('closeSheetBtn');
        const sheet = document.getElementById('actionSheet');
        
        if (sendBtn) {
            sendBtn.onclick = function() {
                alert(`Sending reminder to ${currentTenant?.name}`);
                window.closeActionSheet();
            };
        }
        if (callBtn) {
            callBtn.onclick = function() {
                alert(`Calling ${currentTenant?.name}`);
                window.closeActionSheet();
            };
        }
        if (viewBtn) {
            viewBtn.onclick = function() {
                alert(`Viewing ledger for ${currentTenant?.name}`);
                window.closeActionSheet();
            };
        }
        if (closeBtn) closeBtn.onclick = window.closeActionSheet;
        if (sheet) {
            sheet.addEventListener('click', function(e) { if (e.target === sheet) window.closeActionSheet(); });
        }
    });
</script>
