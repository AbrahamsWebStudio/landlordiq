<div class="flex items-center gap-2 text-sm mb-4 flex-wrap">
    
    {% for crumb in breadcrumbs %}
        
        {% if not forloop.first %}
            <i data-lucide="chevron-right" class="w-3 h-3 text-gray-400"></i>
        {% endif %}

        {% if crumb.url %}
            <a href="{{ crumb.url }}"
               class="text-gray-500 hover:text-[#2D5A27] transition">
                {{ crumb.label }}
            </a>
        {% else %}
            <span class="text-[#2D5A27] font-medium">
                {{ crumb.label }}
            </span>
        {% endif %}

    {% endfor %}

</div>
