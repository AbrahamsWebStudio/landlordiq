{% load static %}
{% if url %}
    <a href="{{ url }}" 
       class="inline-flex items-center justify-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 
              {% if variant == 'primary' %}bg-brand text-white hover:bg-brand-dark shadow-sm hover:shadow-md
              {% elif variant == 'danger' %}bg-red-600 text-white hover:bg-red-700 shadow-sm hover:shadow-md
              {% elif variant == 'secondary' %}bg-gray-500 text-white hover:bg-gray-600
              {% elif variant == 'outline' %}border border-gray-300 text-gray-700 hover:bg-gray-50
              {% elif variant == 'outline-danger' %}border border-red-300 text-red-600 hover:bg-red-50
              {% else %}bg-gray-100 text-gray-700 hover:bg-gray-200{% endif %}
              {{ class }}">
        {% if icon %}<i data-lucide="{{ icon }}" class="w-4 h-4"></i>{% endif %}
        {{ text }}
    </a>
{% else %}
    <button type="{{ type|default:'button' }}" 
            onclick="{{ onclick }}"
            class="inline-flex items-center justify-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 
                   {% if variant == 'primary' %}bg-brand text-white hover:bg-brand-dark shadow-sm hover:shadow-md
                   {% elif variant == 'danger' %}bg-red-600 text-white hover:bg-red-700 shadow-sm hover:shadow-md
                   {% elif variant == 'secondary' %}bg-gray-500 text-white hover:bg-gray-600
                   {% elif variant == 'outline' %}border border-gray-300 text-gray-700 hover:bg-gray-50
                   {% elif variant == 'outline-danger' %}border border-red-300 text-red-600 hover:bg-red-50
                   {% else %}bg-gray-100 text-gray-700 hover:bg-gray-200{% endif %}
                   {{ class }}">
        {% if icon %}<i data-lucide="{{ icon }}" class="w-4 h-4"></i>{% endif %}
        {{ text }}
    </button>
{% endif %}
